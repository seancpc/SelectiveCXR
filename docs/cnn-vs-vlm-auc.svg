<svg viewBox="0 0 720 588" xmlns="http://www.w3.org/2000/svg" font-family="Arial, 'Microsoft JhengHei', sans-serif">
  <rect width="720" height="588" rx="8" fill="#1e1e1e"/>

  <!-- 標題 -->
  <text x="20" y="28" fill="#00bcd4" font-size="17" font-weight="bold">CNN vs VLM ensemble — per-label AUC</text>
  <text x="20" y="48" fill="#9aa0a6" font-size="12">threshold-free,越高越好 · 平均 AUC:CNN 0.626 / VLM 0.585</text>

  <!-- 圖例 -->
  <rect x="500" y="18" width="13" height="13" fill="#00bcd4"/>
  <text x="518" y="29" fill="#e0e0e0" font-size="12">CNN</text>
  <rect x="565" y="18" width="13" height="13" fill="#ff9800"/>
  <text x="583" y="29" fill="#e0e0e0" font-size="12">VLM</text>

  <!-- 0.5 參考線 (x = 190 + 0.5*500 = 440) -->
  <line x1="440" y1="64" x2="440" y2="556" stroke="#555" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="440" y="574" fill="#777" font-size="10" text-anchor="middle">0.5</text>
  <text x="190" y="574" fill="#777" font-size="10" text-anchor="middle">0</text>
  <text x="690" y="574" fill="#777" font-size="10" text-anchor="middle">1.0</text>

  <!-- 1. Atelectasis -->
  <text x="183" y="86" fill="#e0e0e0" font-size="11.5" text-anchor="end">Atelectasis</text>
  <rect x="190" y="69" width="325" height="13" fill="#00bcd4"/><text x="519" y="80" fill="#9aa0a6" font-size="10">0.650</text>
  <rect x="190" y="84" width="271.5" height="13" fill="#ff9800"/><text x="465.5" y="95" fill="#9aa0a6" font-size="10">0.543</text>

  <!-- 2. Consolidation -->
  <text x="183" y="130" fill="#e0e0e0" font-size="11.5" text-anchor="end">Consolidation</text>
  <rect x="190" y="113" width="315.5" height="13" fill="#00bcd4"/><text x="509.5" y="124" fill="#9aa0a6" font-size="10">0.631</text>
  <rect x="190" y="128" width="294.5" height="13" fill="#ff9800"/><text x="488.5" y="139" fill="#9aa0a6" font-size="10">0.589</text>

  <!-- 3. Pneumothorax -->
  <text x="183" y="174" fill="#e0e0e0" font-size="11.5" text-anchor="end">Pneumothorax</text>
  <rect x="190" y="157" width="272" height="13" fill="#00bcd4"/><text x="466" y="168" fill="#9aa0a6" font-size="10">0.544</text>
  <rect x="190" y="172" width="181.5" height="13" fill="#ff9800"/><text x="375.5" y="183" fill="#9aa0a6" font-size="10">0.363</text>

  <!-- 4. Edema -->
  <text x="183" y="218" fill="#e0e0e0" font-size="11.5" text-anchor="end">Edema</text>
  <rect x="190" y="201" width="406.5" height="13" fill="#00bcd4"/><text x="600.5" y="212" fill="#9aa0a6" font-size="10">0.813</text>
  <rect x="190" y="216" width="376.5" height="13" fill="#ff9800"/><text x="570.5" y="227" fill="#9aa0a6" font-size="10">0.753</text>

  <!-- 5. Pleural Effusion -->
  <text x="183" y="262" fill="#e0e0e0" font-size="11.5" text-anchor="end">Pleural Effusion</text>
  <rect x="190" y="245" width="412" height="13" fill="#00bcd4"/><text x="606" y="256" fill="#9aa0a6" font-size="10">0.824</text>
  <rect x="190" y="260" width="363.5" height="13" fill="#ff9800"/><text x="557.5" y="271" fill="#9aa0a6" font-size="10">0.727</text>

  <!-- 6. Pneumonia (VLM 勝) -->
  <text x="183" y="306" fill="#e0e0e0" font-size="11.5" text-anchor="end">Pneumonia</text>
  <rect x="190" y="289" width="248.5" height="13" fill="#00bcd4"/><text x="442.5" y="300" fill="#9aa0a6" font-size="10">0.497</text>
  <rect x="190" y="304" width="288" height="13" fill="#ff9800"/><text x="482" y="315" fill="#9aa0a6" font-size="10">0.576</text>

  <!-- 7. Cardiomegaly -->
  <text x="183" y="350" fill="#e0e0e0" font-size="11.5" text-anchor="end">Cardiomegaly</text>
  <rect x="190" y="333" width="341" height="13" fill="#00bcd4"/><text x="535" y="344" fill="#9aa0a6" font-size="10">0.682</text>
  <rect x="190" y="348" width="328" height="13" fill="#ff9800"/><text x="522" y="359" fill="#9aa0a6" font-size="10">0.656</text>

  <!-- 8. Lung Lesion (VLM 勝) -->
  <text x="183" y="394" fill="#e0e0e0" font-size="11.5" text-anchor="end">Lung Lesion</text>
  <rect x="190" y="377" width="262" height="13" fill="#00bcd4"/><text x="456" y="388" fill="#9aa0a6" font-size="10">0.524</text>
  <rect x="190" y="392" width="280.5" height="13" fill="#ff9800"/><text x="474.5" y="403" fill="#9aa0a6" font-size="10">0.561</text>

  <!-- 9. Fracture (VLM 勝) -->
  <text x="183" y="438" fill="#e0e0e0" font-size="11.5" text-anchor="end">Fracture</text>
  <rect x="190" y="421" width="254.5" height="13" fill="#00bcd4"/><text x="448.5" y="432" fill="#9aa0a6" font-size="10">0.509</text>
  <rect x="190" y="436" width="288" height="13" fill="#ff9800"/><text x="482" y="447" fill="#9aa0a6" font-size="10">0.576</text>

  <!-- 10. Lung Opacity (VLM 勝) -->
  <text x="183" y="482" fill="#e0e0e0" font-size="11.5" text-anchor="end">Lung Opacity</text>
  <rect x="190" y="465" width="301" height="13" fill="#00bcd4"/><text x="495" y="476" fill="#9aa0a6" font-size="10">0.602</text>
  <rect x="190" y="480" width="308.5" height="13" fill="#ff9800"/><text x="502.5" y="491" fill="#9aa0a6" font-size="10">0.617</text>

  <!-- 11. Enlarged Cardiomediastinum -->
  <text x="183" y="526" fill="#e0e0e0" font-size="11.5" text-anchor="end">Enlarged Card.</text>
  <rect x="190" y="509" width="305" height="13" fill="#00bcd4"/><text x="499" y="520" fill="#9aa0a6" font-size="10">0.610</text>
  <rect x="190" y="524" width="237" height="13" fill="#ff9800"/><text x="431" y="535" fill="#9aa0a6" font-size="10">0.474</text>
</svg>
